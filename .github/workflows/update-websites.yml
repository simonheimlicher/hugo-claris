name: Update websites

# Update Hugo modules and trigger deployment on dependent website repositories.
#
# Behavior:
# - push to main: Update module reference in downstream repos (branch must exist)
# - push to feature branch: Create branch if needed, then update module reference
# - delete feature branch: Delete matching branches in downstream repos
#
# Security note:
#   Values derived from github.* (ref_name, event.sender.*, commit messages) are
#   attacker-influenceable. They must NEVER be interpolated directly into a `run:`
#   block — always pass via `env:` and consume with quoted bash variables.

on:
  push:
  pull_request:
  delete: # Triggers when a branch is deleted
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job: Update module reference in downstream websites (push events)
  # ═══════════════════════════════════════════════════════════════════════════
  update-website:
    # Only run on push events (not delete)
    if: github.event_name != 'delete'
    runs-on: ubuntu-latest

    # Prevent race conditions when multiple pushes happen quickly.
    # Each repo+branch combination gets its own queue; newer runs cancel older ones.
    concurrency:
      group: update-${{ matrix.website.repo }}-${{ github.ref_name }}
      cancel-in-progress: true

    # Process all websites even if one fails
    strategy:
      fail-fast: false
      matrix:
        # Add new dependent websites here. Each entry only needs the repo name.
        website:
          - repo: simonheimlicher/hugo-claris-demo
          - repo: simonheimlicher/heimlicher.com
          - repo: simonheimlicher/spx.sh

    permissions:
      contents: read

    env:
      HUGO_VERSION: ${{ vars.HUGO_VERSION || '0.153.3' }}

    steps:
      # ─────────────────────────────────────────────────────────────────────────
      # Setup: Install tools and checkout source repo
      # ─────────────────────────────────────────────────────────────────────────
      - name: Setup Hugo
        # Direct download from Hugo releases (no third-party action needed)
        run: |
          wget -O "${RUNNER_TEMP}/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${RUNNER_TEMP}/hugo.deb"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          # Cache will be configured after website checkout (needs go.sum)
          cache: false

      # Checkout this repo (hugo-claris) to read the commit message
      - name: Checkout hugo-claris
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          path: hugo-claris

      # Save the commit message to include in the downstream commit
      - name: Save commit message
        env:
          SOURCE_REPO: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          cd hugo-claris
          {
            printf 'chore: update %s@%s\n\n' "$SOURCE_REPO" "$BRANCH_NAME"
            git log -1 --pretty=%B
          } > "${RUNNER_TEMP}/commit_message.txt"

      # ─────────────────────────────────────────────────────────────────────────
      # Check if target branch exists in the website repo
      # ─────────────────────────────────────────────────────────────────────────

      - name: Check if branch exists in ${{ matrix.website.repo }}
        id: check-branch
        env:
          WEBSITE_REPO: ${{ matrix.website.repo }}
          BRANCH_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PAT }}
        run: |
          if gh api "repos/${WEBSITE_REPO}/branches/${BRANCH_NAME}" --silent 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # ─────────────────────────────────────────────────────────────────────────
      # Create branch if it doesn't exist (feature branches only, not main)
      # ─────────────────────────────────────────────────────────────────────────

      - name: Create branch in ${{ matrix.website.repo }}
        id: create-branch
        if: steps.check-branch.outputs.exists == 'false' && github.ref_name != 'main'
        env:
          WEBSITE_REPO: ${{ matrix.website.repo }}
          BRANCH_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PAT }}
        run: |
          # Get the SHA of the main branch
          MAIN_SHA=$(gh api "repos/${WEBSITE_REPO}/git/refs/heads/main" --jq '.object.sha')

          # Create the new branch from main
          gh api "repos/${WEBSITE_REPO}/git/refs" \
            --method POST \
            --field ref="refs/heads/${BRANCH_NAME}" \
            --field sha="$MAIN_SHA"

          echo "created=true" >> "$GITHUB_OUTPUT"
          {
            printf '### Created branch in %s\n' "$WEBSITE_REPO"
            printf 'Created `%s` from `main`\n' "$BRANCH_NAME"
          } >> "$GITHUB_STEP_SUMMARY"

      # Skip if main branch doesn't exist (it should always exist)
      - name: Skip - main branch does not exist
        if: steps.check-branch.outputs.exists == 'false' && github.ref_name == 'main'
        env:
          WEBSITE_REPO: ${{ matrix.website.repo }}
        run: |
          echo "::warning::Branch 'main' does not exist in ${WEBSITE_REPO}, skipping"
          {
            printf '### Skipped %s\n' "$WEBSITE_REPO"
            printf 'Branch `main` does not exist (this should not happen)\n'
          } >> "$GITHUB_STEP_SUMMARY"

      # ─────────────────────────────────────────────────────────────────────────
      # Checkout and update the website repo
      # ─────────────────────────────────────────────────────────────────────────

      - name: Checkout ${{ matrix.website.repo }}
        if: steps.check-branch.outputs.exists == 'true' || steps.create-branch.outputs.created == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.website.repo }}
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GH_ACTIONS_PAT }}
          path: website

      # Configure Go module cache after checkout (needs go.sum from website)
      - name: Configure Go cache
        if: steps.check-branch.outputs.exists == 'true' || steps.create-branch.outputs.created == 'true'
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('website/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Update Hugo modules in ${{ matrix.website.repo }}
        if: steps.check-branch.outputs.exists == 'true' || steps.create-branch.outputs.created == 'true'
        env:
          WEBSITE_REPO: ${{ matrix.website.repo }}
          BRANCH_NAME: ${{ github.ref_name }}
          ACTOR_LOGIN: ${{ github.actor }}
          EVENT_SENDER_ID: ${{ github.event.sender.id }}
          EVENT_SENDER_LOGIN: ${{ github.event.sender.login }}
        run: |
          cd website

          # Pin hugo-claris to the current branch. `hugo mod get` resolves the
          # branch ref to a pseudo-version and rewrites go.mod/go.sum. No regex
          # gymnastics.
          hugo mod get "github.com/simonheimlicher/hugo-claris@${BRANCH_NAME}"
          hugo mod tidy

          # Configure git for the commit
          git config user.name "$ACTOR_LOGIN"
          git config user.email "${EVENT_SENDER_ID}+${EVENT_SENDER_LOGIN}@users.noreply.github.com"

          # Stage all changes
          git add .

          # Only commit and push if there are actual changes
          if ! git diff-index --quiet HEAD; then
            git commit --file="${RUNNER_TEMP}/commit_message.txt"
            git push
            {
              printf '### Updated %s\n' "$WEBSITE_REPO"
              printf 'Pushed module update to `%s`\n' "$BRANCH_NAME"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              printf '### No changes for %s\n' "$WEBSITE_REPO"
              printf 'Module versions already up to date on `%s`\n' "$BRANCH_NAME"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # Job: Delete matching branches in downstream websites (delete events)
  # ═══════════════════════════════════════════════════════════════════════════
  delete-branch:
    # Only run on branch delete events, and never delete main
    if: github.event_name == 'delete' && github.event.ref_type == 'branch' && github.event.ref != 'main'
    runs-on: ubuntu-latest

    # Process all websites even if one fails
    strategy:
      fail-fast: false
      matrix:
        website:
          - repo: simonheimlicher/hugo-claris-demo
          - repo: simonheimlicher/heimlicher.com
          - repo: simonheimlicher/spx.sh

    permissions:
      contents: read

    steps:
      - name: Delete branch in ${{ matrix.website.repo }}
        env:
          WEBSITE_REPO: ${{ matrix.website.repo }}
          # For delete events, branch name is in github.event.ref (not github.ref_name)
          BRANCH_NAME: ${{ github.event.ref }}
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PAT }}
        run: |
          # Check if branch exists before trying to delete
          if gh api "repos/${WEBSITE_REPO}/branches/${BRANCH_NAME}" --silent 2>/dev/null; then
            gh api "repos/${WEBSITE_REPO}/git/refs/heads/${BRANCH_NAME}" --method DELETE
            {
              printf '### Deleted branch in %s\n' "$WEBSITE_REPO"
              printf 'Deleted `%s`\n' "$BRANCH_NAME"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              printf '### Branch not found in %s\n' "$WEBSITE_REPO"
              printf 'Branch `%s` does not exist (already deleted or never created)\n' "$BRANCH_NAME"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
