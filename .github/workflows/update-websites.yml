name: Update websites

# Update Hugo modules and trigger deployment on dependent website repositories.
#
# Behavior:
# - push to main: Update module reference in downstream repos (branch must exist)
# - push to feature branch: Create branch if needed, then update module reference
# - delete feature branch: Delete matching branches in downstream repos

on:
  push:
  pull_request:
  delete: # Triggers when a branch is deleted
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job: Update module reference in downstream websites (push events)
  # ═══════════════════════════════════════════════════════════════════════════
  update-website:
    # Only run on push events (not delete)
    if: github.event_name != 'delete'
    runs-on: ubuntu-latest

    # Prevent race conditions when multiple pushes happen quickly.
    # Each repo+branch combination gets its own queue; newer runs cancel older ones.
    concurrency:
      group: update-${{ matrix.website.repo }}-${{ github.ref_name }}
      cancel-in-progress: true

    # Process all websites even if one fails
    strategy:
      fail-fast: false
      matrix:
        # Add new dependent websites here. Each entry only needs the repo name.
        website:
          - repo: simonheimlicher/hugo-claris-demo
          - repo: simonheimlicher/heimlicher.com
          - repo: simonheimlicher/spx.sh

    permissions:
      contents: read

    env:
      HUGO_VERSION: ${{ vars.HUGO_VERSION || '0.153.3' }}
      BRANCH_NAME: ${{ github.ref_name }}
      # Git author info derived from the actor who triggered the workflow
      EVENT_ACTOR_ID: "${{ github.actor }}"
      EVENT_ACTOR_EMAIL: "${{ github.event.sender.id }}+${{ github.event.sender.login }}@users.noreply.github.com"
      COMMIT_MESSAGE_PREFIX: "chore: update ${{ github.repository }}@${{ github.ref_name }}\n\n"

    steps:
      # ─────────────────────────────────────────────────────────────────────────
      # Setup: Install tools and checkout source repo
      # ─────────────────────────────────────────────────────────────────────────
      - name: Setup Hugo
        # Direct download from Hugo releases (no third-party action needed)
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          # Cache will be configured after website checkout (needs go.sum)
          cache: false

      # Checkout this repo (hugo-claris) to read the commit message
      - name: Checkout hugo-claris
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          path: hugo-claris

      # Save the commit message to include in the downstream commit
      - name: Save commit message
        run: |
          cd hugo-claris
          echo "${{ env.COMMIT_MESSAGE_PREFIX }}$(git log -1 --pretty=%B)" > ${{ runner.temp }}/commit_message.txt

      # ─────────────────────────────────────────────────────────────────────────
      # Check if target branch exists in the website repo
      # ─────────────────────────────────────────────────────────────────────────

      - name: Check if branch exists in ${{ matrix.website.repo }}
        id: check-branch
        run: |
          if gh api repos/${{ matrix.website.repo }}/branches/${{ env.BRANCH_NAME }} --silent 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PAT }}

      # ─────────────────────────────────────────────────────────────────────────
      # Create branch if it doesn't exist (feature branches only, not main)
      # ─────────────────────────────────────────────────────────────────────────

      - name: Create branch ${{ env.BRANCH_NAME }} in ${{ matrix.website.repo }}
        id: create-branch
        if: steps.check-branch.outputs.exists == 'false' && env.BRANCH_NAME != 'main'
        run: |
          # Get the SHA of the main branch
          MAIN_SHA=$(gh api repos/${{ matrix.website.repo }}/git/refs/heads/main --jq '.object.sha')

          # Create the new branch from main
          gh api repos/${{ matrix.website.repo }}/git/refs \
            --method POST \
            --field ref="refs/heads/${{ env.BRANCH_NAME }}" \
            --field sha="$MAIN_SHA"

          echo "created=true" >> $GITHUB_OUTPUT
          echo "### Created branch in ${{ matrix.website.repo }}" >> $GITHUB_STEP_SUMMARY
          echo "Created \`${{ env.BRANCH_NAME }}\` from \`main\`" >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PAT }}

      # Skip if main branch doesn't exist (it should always exist)
      - name: Skip - branch does not exist
        if: steps.check-branch.outputs.exists == 'false' && env.BRANCH_NAME == 'main'
        run: |
          echo "::warning::Branch 'main' does not exist in ${{ matrix.website.repo }}, skipping"
          echo "### Skipped ${{ matrix.website.repo }}" >> $GITHUB_STEP_SUMMARY
          echo "Branch \`main\` does not exist (this should not happen)" >> $GITHUB_STEP_SUMMARY

      # ─────────────────────────────────────────────────────────────────────────
      # Checkout and update the website repo
      # ─────────────────────────────────────────────────────────────────────────

      - name: Checkout ${{ matrix.website.repo }}
        if: steps.check-branch.outputs.exists == 'true' || steps.create-branch.outputs.created == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.website.repo }}
          ref: ${{ env.BRANCH_NAME }}
          token: ${{ secrets.GH_ACTIONS_PAT }}
          path: website

      # Configure Go module cache after checkout (needs go.sum from website)
      - name: Configure Go cache
        if: steps.check-branch.outputs.exists == 'true' || steps.create-branch.outputs.created == 'true'
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('website/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Update Hugo modules in ${{ matrix.website.repo }}
        if: steps.check-branch.outputs.exists == 'true' || steps.create-branch.outputs.created == 'true'
        run: |
          cd website

          # Update go.mod to reference the current branch of hugo-claris
          sed --in-place -Ee 's!(github.com/simonheimlicher/hugo-claris) [^ ]+(.*)!\1 '"${{ env.BRANCH_NAME }}"'\2!' go.mod

          # Fetch latest module versions and clean up go.mod/go.sum
          hugo mod get -u
          hugo mod tidy

          # Configure git for the commit
          git config user.name "${{ env.EVENT_ACTOR_ID }}"
          git config user.email "${{ env.EVENT_ACTOR_EMAIL }}"

          # Stage all changes
          git add .

          # Only commit and push if there are actual changes
          if ! git diff-index --quiet HEAD; then
            git commit --file=${{ runner.temp }}/commit_message.txt
            git push

            # Add success message to job summary
            echo "### Updated ${{ matrix.website.repo }}" >> $GITHUB_STEP_SUMMARY
            echo "Pushed module update to \`${{ env.BRANCH_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          else
            # No changes needed
            echo "### No changes for ${{ matrix.website.repo }}" >> $GITHUB_STEP_SUMMARY
            echo "Module versions already up to date on \`${{ env.BRANCH_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # Job: Delete matching branches in downstream websites (delete events)
  # ═══════════════════════════════════════════════════════════════════════════
  delete-branch:
    # Only run on branch delete events, and never delete main
    if: github.event_name == 'delete' && github.event.ref_type == 'branch' && github.event.ref != 'main'
    runs-on: ubuntu-latest

    # Process all websites even if one fails
    strategy:
      fail-fast: false
      matrix:
        website:
          - repo: simonheimlicher/hugo-claris-demo
          - repo: simonheimlicher/heimlicher.com
          - repo: simonheimlicher/spx.sh

    permissions:
      contents: read

    env:
      # For delete events, branch name is in github.event.ref (not github.ref_name)
      BRANCH_NAME: ${{ github.event.ref }}

    steps:
      - name: Delete branch ${{ env.BRANCH_NAME }} in ${{ matrix.website.repo }}
        run: |
          # Check if branch exists before trying to delete
          if gh api repos/${{ matrix.website.repo }}/branches/${{ env.BRANCH_NAME }} --silent 2>/dev/null; then
            gh api repos/${{ matrix.website.repo }}/git/refs/heads/${{ env.BRANCH_NAME }} \
              --method DELETE

            echo "### Deleted branch in ${{ matrix.website.repo }}" >> $GITHUB_STEP_SUMMARY
            echo "Deleted \`${{ env.BRANCH_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Branch not found in ${{ matrix.website.repo }}" >> $GITHUB_STEP_SUMMARY
            echo "Branch \`${{ env.BRANCH_NAME }}\` does not exist (already deleted or never created)" >> $GITHUB_STEP_SUMMARY
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_ACTIONS_PAT }}
